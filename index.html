<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Residencya 2026 - Immobilier Maroc</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220; /* bleu foncé */
      color: #e5e7eb;
    }

    header {
      background: #0f1b33;
      text-align: center;
      padding: 60px 20px;
      border-bottom: 1px solid #1f2a44;
    }

    header h1 {
      margin: 10px 0 5px;
      font-size: 42px;
      color: #ffffff;
    }

    header p {
      margin: 5px 0;
      opacity: 0.85;
    }

    .tagline {
      margin-top: 10px;
      color: #93c5fd;
      font-style: italic;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111a2e;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h2 {
      color: #ffffff;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      color: #cbd5e1;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #fff;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png.png" style="width:110px; margin-bottom:10px;">
  <h1>Residencya 2026</h1>
  <p>Cabinet de management immobilier</p>
  <div class="tagline">Votre confiance et notre succès !</div>
</header>

<div class="container">

  <div class="card">
    <h2>Formulaire immobilier</h2>

    <label>Type de service</label>
    <select id="service">
      <option>Vente</option>
      <option>Achat</option>
      <option>Location</option>
      <option>Investissement</option>
    </select>

    <label>Mandat souhaité</label>
    <select id="mandat">
      <option>Simple</option>
      <option>Exclusif</option>
      <option>Conseil uniquement</option>
    </select>

    <label>Votre intérêt</label>
    <select id="interet">
      <option>Immobilier résidentiel</option>
      <option>Immobilier commercial</option>
    </select>

    <label>Vous êtes</label>
    <select id="statut">
      <option>Acheteur</option>
      <option>Vendeur</option>
      <option>Locataire</option>
      <option>Bailleur</option>
      <option>Agence</option>
      <option>Promoteur</option>
      <option>Investisseur</option>
    </select>

    <label>Type de bien</label>
    <select id="bien">
      <option>Appartement</option>
      <option>Villa</option>
      <option>Maison</option>
      <option>Studio</option>
      <option>Duplex</option>
      <option>Terrain</option>
      <option>Local commercial</option>
      <option>Bureau</option>
      <option>Magasin</option>
      <option>Autre</option>
    </select>

    <label>Ville</label>
    <input type="text" id="ville" placeholder="Partout au Maroc">

    <label>Description</label>
    <textarea id="desc" rows="4"></textarea>

    <label>Nom complet</label>
    <input type="text" id="nom">

    <label>Téléphone</label>
    <input type="text" id="tel">

    <label>Email</label>
    <input type="email" id="email">

    <label>Heure de RDV</label>
    <input type="text" id="rdv">

    <button onclick="sendWhatsApp()">Envoyer via WhatsApp</button>
  </div>

</div>

<div class="footer">
  Residencya 2026 — All rights reserved
</div>

<script>
function sendWhatsApp() {

  let service = document.getElementById("service").value;
  let mandat = document.getElementById("mandat").value;
  let interet = document.getElementById("interet").value;
  let statut = document.getElementById("statut").value;
  let bien = document.getElementById("bien").value;
  let ville = document.getElementById("ville").value;
  let desc = document.getElementById("desc").value;
  let nom = document.getElementById("nom").value;
  let tel = document.getElementById("tel").value;
  let email = document.getElementById("email").value;
  let rdv = document.getElementById("rdv").value;

  let message =
`Bonjour Residencya 2026,%0A
- Service : ${service}%0A
- Mandat : ${mandat}%0A
- Intérêt : ${interet}%0A
- Statut : ${statut}%0A
- Bien : ${bien}%0A
- Ville : ${ville}%0A
- Description : ${desc}%0A
- Nom : ${nom}%0A
- Téléphone : ${tel}%0A
- Email : ${email}%0A
- RDV : ${rdv}`;

  let phone = "212600795000";
  let url = "https://wa.me/" + phone + "?text=" + message;

  window.open(url, "_blank");
}
</script>

</body>
</html>
